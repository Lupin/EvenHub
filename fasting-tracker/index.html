<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Fasting Tracker</title>
<style>
/* ── Phone Settings UI ──────────────────────────────── */
#phone-ui {
  display: none;
  --bg: #0a0a0a; --card: #141414; --border: #2a2a2a;
  --tc1: #f0f0f0; --tc2: #a0a0a0; --accent: #4ADE80;
  padding: 0 12px; background: var(--bg); color: var(--tc1);
  font-family: 'FK Display',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  font-size: 15px; font-weight: 300; letter-spacing: -0.15px;
  min-height: 100dvh; -webkit-font-smoothing: antialiased;
}
#phone-ui h2 { font-size: 20px; font-weight: 400; letter-spacing: -0.6px; padding: 20px 0 16px; margin: 0; }
#phone-ui h3 { font-size: 11px; font-weight: 400; letter-spacing: -0.11px; color: var(--tc2); text-transform: uppercase; margin: 24px 0 8px; }
.lang-row { display:flex; gap:0; border-radius:6px; overflow:hidden; }
.lang-row button { flex:1; padding:8px 0; font-size:13px; font-weight:400; border:1px solid var(--border); background:var(--card); color:var(--tc2); cursor:pointer; }
.lang-row button.active { background:#1a1a1a; color:var(--tc1); }
.preset-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.preset-card { padding:16px 12px; border:1px solid var(--border); border-radius:6px; background:var(--card); cursor:pointer; display:flex; align-items:flex-start; gap:10px; }
.preset-card.active { border-color:var(--accent); background:#002010; }
.dot { width:12px; height:12px; border-radius:2px; flex-shrink:0; margin-top:1px; }
.dot.custom { border:1.5px dashed var(--tc2); background:transparent; }
.card-name { font-size:15px; font-weight:400; color:var(--tc1); display:block; margin-bottom:2px; }
.card-desc { font-size:11px; color:var(--tc2); }
.time-row { display:grid; grid-template-columns:auto 1fr auto 1fr; align-items:center; gap:8px; }
.time-label { font-size:13px; color:var(--tc2); }
.time-input { width:100%; padding:10px 12px; font-size:15px; font-weight:300; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--tc1); }
.time-sep { font-size:15px; color:var(--tc2); }
.mode-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.mode-btn { padding:16px 12px; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--tc2); cursor:pointer; text-align:center; }
.mode-btn.active { border-color:var(--accent); background:#002010; }
.mode-icon { font-size:28px; display:block; margin-bottom:6px; }
.mode-label { font-size:15px; font-weight:400; color:var(--tc1); }
.mode-sub { font-size:11px; color:var(--tc2); margin-top:2px; display:block; }
.actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:32px; padding-bottom:24px; }
.btn { padding:12px; border:none; border-radius:6px; font-size:15px; font-weight:400; cursor:pointer; }
.btn-primary { background:var(--accent); color:#000; }
.btn-secondary { background:var(--card); color:var(--tc2); border:1px solid var(--border); }
.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:var(--accent); color:#000; padding:8px 20px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:10; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- PHONE UI: settings (always visible on phone screen) -->
<div id="phone-ui">
  <h2 id="pageTitle">Fasting Tracker</h2>

  <h3 id="langLabel">Language</h3>
  <div class="lang-row" id="langToggle">
    <button data-lang="en" class="active">English</button>
    <button data-lang="fr">Français</button>
  </div>

  <h3 id="typeLabel">Fasting Type</h3>
  <div class="preset-grid" id="presetGrid"></div>

  <h3 id="schedLabel">Schedule</h3>
  <div id="scheduleSection">
    <label class="time-label" id="startLabel">Fasting starts at</label>
    <input type="time" class="time-input" id="fastStart" style="width:100%;margin-bottom:8px">
    <label class="time-label" id="endLabel">Fasting ends at</label>
    <input type="time" class="time-input" id="fastEnd" style="width:100%">
  </div>

  <h3 id="displayLabel">Display Mode</h3>
  <div class="mode-row" id="modeSelector">
    <button class="mode-btn active" data-mode="text">
      <span class="mode-icon">⊞</span>
      <span class="mode-label" id="textLabel">Text</span>
      <span class="mode-sub" id="textSub">Corner display</span>
    </button>
    <button class="mode-btn" data-mode="timeline">
      <span class="mode-icon">▬</span>
      <span class="mode-label" id="tlLabel">Timeline</span>
      <span class="mode-sub" id="tlSub">Progress bar</span>
    </button>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" id="btnCancel">Cancel</button>
    <button class="btn btn-primary" id="btnSave">Save</button>
  </div>
  <div class="toast" id="toast">Saved</div>
</div>

<script>
/* ── PHONE SETTINGS UI (vanilla JS, self-contained) ──── */
(function(){
'use strict';
var T={en:{
  title:'Fasting Tracker',lang:'Language',type:'Fasting Type',
  schedule:'Schedule',start:'Fasting starts at',end:'Fasting ends at',
  display:'Display Mode',text:'Text',textDesc:'Corner display',
  timeline:'Timeline',timelineDesc:'Progress bar',
  custom:'Custom',customDesc:'Your own hours',
  cancel:'Cancel',save:'Save',saved:'Saved',
  fasting:'FASTING',eating:'EATING',restDay:'REST DAY',
  p14n:'14:10 — Beginner',p14d:'14h fast · 10h eating',
  p16n:'16:8 — Leangains',p16d:'16h fast · 8h eating',
  p18n:'18:6 — Extended',p18d:'18h fast · 6h eating',
  p20n:'20:4 — Warrior',p20d:'20h fast · 4h eating',
  p23n:'OMAD — One Meal',p23d:'23h fast · 1 meal',
  p52n:'5:2 — Weekday',p52d:'5d eat · 2d fast (Tue/Thu)',
  padfn:'ADF — Alt. Day',padfd:'Fast every other day'},
fr:{
  title:'Tracker Jeûne',lang:'Langue',type:'Protocole',
  schedule:'Horaires',start:'Début du jeûne',end:'Fin du jeûne',
  display:'Affichage',text:'Texte',textDesc:'Coins discrets',
  timeline:'Barre',timelineDesc:'Ligne progression',
  custom:'Perso',customDesc:'Vos horaires',
  cancel:'Annuler',save:'Enregistrer',saved:'Sauvegardé',
  fasting:'À JEUN',eating:'REPAS',restDay:'JOUR OFF',
  p14n:'14:10 — Doux',p14d:'14h à jeun · 10h repas',
  p16n:'16:8 — Leangains',p16d:'16h à jeun · 8h repas',
  p18n:'18:6 — Confirmé',p18d:'18h à jeun · 6h repas',
  p20n:'20:4 — Warrior',p20d:'20h à jeun · 4h repas',
  p23n:'OMAD — Repas unique',p23d:'23h à jeun · 1 repas',
  p52n:'5:2 — Hebdo',p52d:'5j normal · 2j à jeun (Mar/Jeu)',
  padfn:'ADF — Alterné',padfd:'À jeun un jour sur deux'}};
var PRESETS=[
  {id:'14:10',start:'20:00',end:'10:00',color:'#4CAF50'},
  {id:'16:8',start:'20:00',end:'12:00',color:'#2196F3'},
  {id:'18:6',start:'20:00',end:'14:00',color:'#9C27B0'},
  {id:'20:4',start:'20:00',end:'16:00',color:'#FF9800'},
  {id:'23:1',start:'19:00',end:'18:00',color:'#F44336'},
  {id:'5:2-week',start:'00:00',end:'00:00',color:'#607D8B'},
  {id:'adf',start:'00:00',end:'00:00',color:'#795548'}];
var cfg={presetId:'16:8',schedule:{fastStart:'20:00',fastEnd:'12:00'},displayMode:'text',lang:'en'};
try{var r=localStorage.getItem('even-fasting-config');if(r){var p=JSON.parse(r);Object.assign(cfg,p)}}catch(e){}
function t(k){var d=T[cfg.lang]||T.en;return d[k]||T.en[k]||k}
function pn(id){var m={'14:10':'p14n','16:8':'p16n','18:6':'p18n','20:4':'p20n','23:1':'p23n','5:2-week':'p52n','adf':'padfn'};return t(m[id]||'custom')}
function pd(id){var m={'14:10':'p14d','16:8':'p16d','18:6':'p18d','20:4':'p20d','23:1':'p23d','5:2-week':'p52d','adf':'padfd'};return t(m[id]||'customDesc')}
function save(){localStorage.setItem('even-fasting-config',JSON.stringify(cfg))}
window.getFastingConfig = function(){return cfg};

function render(){
  document.title=t('title');
  var ids={'pageTitle':'title','langLabel':'lang','typeLabel':'type','schedLabel':'schedule','startLabel':'start','endLabel':'end','displayLabel':'display','textLabel':'text','textSub':'textDesc','tlLabel':'timeline','tlSub':'timelineDesc','btnCancel':'cancel','btnSave':'save'};
  for(var k in ids){var el=document.getElementById(k);if(el)el.textContent=t(ids[k])}
  var lbs=document.querySelectorAll('#langToggle button');
  lbs.forEach(function(b){b.classList.toggle('active',b.dataset.lang===cfg.lang)});
  var g=document.getElementById('presetGrid');g.innerHTML='';
  PRESETS.forEach(function(p){
    var c=document.createElement('div');c.className='preset-card';
    if(cfg.presetId===p.id){c.classList.add('active');c.style.borderColor=p.color}
    c.innerHTML='<div class="dot" style="background:'+p.color+'"></div><div><span class="card-name">'+pn(p.id)+'</span><span class="card-desc">'+pd(p.id)+'</span></div>';
    c.onclick=function(){sel(p.id)};g.appendChild(c);
  });
  var cc=document.createElement('div');cc.className='preset-card';
  if(cfg.presetId==='custom')cc.classList.add('active');
  cc.innerHTML='<div class="dot custom"></div><div><span class="card-name">'+t('custom')+'</span><span class="card-desc">'+t('customDesc')+'</span></div>';
  cc.onclick=function(){sel('custom')};g.appendChild(cc);
  document.getElementById('fastStart').value=cfg.schedule.fastStart;
  document.getElementById('fastEnd').value=cfg.schedule.fastEnd;
  // Show schedule only when Custom is selected
  document.getElementById('scheduleSection').style.display = cfg.presetId === 'custom' ? 'block' : 'none';
  document.getElementById('schedLabel').style.display = cfg.presetId === 'custom' ? 'block' : 'none';
  var mbs=document.querySelectorAll('#modeSelector button');
  mbs.forEach(function(b){b.classList.toggle('active',b.dataset.mode===cfg.displayMode)});
}
function sel(id){
  cfg.presetId=id;
  if(id!=='custom'){var p=PRESETS.find(function(x){return x.id===id});if(p){cfg.schedule.fastStart=p.start;cfg.schedule.fastEnd=p.end}}
  render();
}
document.getElementById('langToggle').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;cfg.lang=b.dataset.lang;document.documentElement.lang=cfg.lang;render()});
document.getElementById('fastStart').addEventListener('input',function(){
  var newStart = this.value;
  var oldStart = cfg.schedule.fastStart;
  cfg.schedule.fastStart = newStart;
  if (cfg.presetId !== 'custom') {
    // Auto-shift fastEnd to keep same fasting duration
    var oldH = parseInt(oldStart.split(':')[0]), oldM = parseInt(oldStart.split(':')[1]);
    var oldStartMin = oldH * 60 + oldM;
    var endH = parseInt(cfg.schedule.fastEnd.split(':')[0]), endM = parseInt(cfg.schedule.fastEnd.split(':')[1]);
    var oldEndMin = endH * 60 + endM;
    // Duration: if end < start (overnight), add 24h
    var duration = oldEndMin <= oldStartMin ? oldEndMin + 1440 - oldStartMin : oldEndMin - oldStartMin;
    // New end = new start + duration
    var newH = parseInt(newStart.split(':')[0]), newM = parseInt(newStart.split(':')[1]);
    var newStartMin = newH * 60 + newM;
    var newEndMin = (newStartMin + duration) % 1440;
    var eh = Math.floor(newEndMin / 60), em = newEndMin % 60;
    cfg.schedule.fastEnd = String(eh).padStart(2,'0') + ':' + String(em).padStart(2,'0');
  }
  cfg.presetId = 'custom';
  render();
});
document.getElementById('fastEnd').addEventListener('input',function(){cfg.schedule.fastEnd=this.value;cfg.presetId='custom';render()});
document.getElementById('modeSelector').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;cfg.displayMode=b.dataset.mode;render()});
document.getElementById('btnSave').addEventListener('click',function(){cfg.schedule.fastStart=document.getElementById('fastStart').value;cfg.schedule.fastEnd=document.getElementById('fastEnd').value;save();var toast=document.getElementById('toast');toast.textContent=t('saved');toast.classList.add('show');setTimeout(function(){toast.classList.remove('show')},1500);
  // Refresh glasses via SDK rebuild (no page reload)
  if (window.__fastingRefresh) window.__fastingRefresh();
});
document.getElementById('btnCancel').addEventListener('click',function(){try{var r=localStorage.getItem('even-fasting-config');if(r){var p=JSON.parse(r);Object.assign(cfg,p)}}catch(e){}render()});

document.getElementById('phone-ui').style.display = 'block';
render();

// Brightness compatibility: show phone UI in WebView
// The glasses rendering happens via the SDK bridge (loaded below)
// When the bridge connects, it reads config from localStorage and renders on glasses
})();
</script>

<!-- GLASSES RENDERING: Even Hub SDK bridge -->
<script type="module" src="/src/main.ts"></script>

</body>
</html>
