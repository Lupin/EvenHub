<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fasting Tracker — Settings</title>
  <style>
    :root {
      --bg: #111;
      --card: #1a1a1a;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #2196F3;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 16px;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh; min-height: 100dvh;
    }
    h2 { margin: 0 0 12px; font-size: 20px; }
    h3 {
      margin: 16px 0 8px; font-size: 14px;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .lang-toggle { display: flex; gap: 8px; margin-bottom: 4px; }
    .lang-toggle button {
      flex: 1; padding: 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--card);
      color: var(--text); cursor: pointer; font-size: 14px; font-weight: 600;
    }
    .lang-toggle button.active {
      border-color: var(--accent); background: #1a2a3a;
    }
    .preset-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin: 8px 0;
    }
    .preset-card {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; display: flex; align-items: center;
      gap: 10px; cursor: pointer; background: var(--card);
      transition: border-color .2s;
    }
    .preset-card.active {
      border-color: var(--accent); background: #1a2a3a;
    }
    .dot {
      width: 20px; height: 20px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.custom { border: 2px dashed var(--muted); background: transparent; }
    .preset-card .info { flex: 1; min-width: 0; }
    .preset-card .name { font-size: 13px; font-weight: 600; display: block; }
    .preset-card .desc { font-size: 11px; color: var(--muted); }
    .time-section { margin: 8px 0; }
    .time-inputs { display: flex; align-items: center; gap: 10px; }
    .time-inputs label { font-size: 13px; color: var(--muted); }
    .time-inputs input {
      padding: 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--card);
      color: var(--text); font-size: 14px; width: 100px;
    }
    .arrow { font-size: 18px; color: var(--muted); }
    .mode-selector { display: flex; gap: 8px; margin: 8px 0; }
    .mode-selector button {
      flex: 1; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--card);
      color: var(--text); cursor: pointer; text-align: center;
    }
    .mode-selector button.active {
      border-color: var(--accent); background: #1a2a3a;
    }
    .mode-selector .icon { font-size: 24px; display: block; margin-bottom: 4px; }
    .mode-selector small {
      display: block; font-size: 10px; color: var(--muted); margin-top: 2px;
    }
    .actions { display: flex; gap: 8px; margin-top: 20px; }
    .actions button {
      flex: 1; padding: 12px; border: none;
      border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600;
    }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-cancel { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

  <!-- Language Toggle -->
  <h3 data-i18n="language">Language</h3>
  <div class="lang-toggle" id="langToggle">
    <button data-lang="en">EN</button>
    <button data-lang="fr">FR</button>
  </div>

  <!-- Fasting Type -->
  <h3 data-i18n="fastingType">Fasting Type</h3>
  <div class="preset-grid" id="presetGrid"></div>

  <!-- Schedule / Time inputs -->
  <div class="time-section">
    <h3 data-i18n="schedule">Schedule</h3>
    <div class="time-inputs">
      <label data-i18n="fastStart">Fast start</label>
      <input type="time" id="fastStart">
      <span class="arrow">→</span>
      <label data-i18n="fastEnd">Fast end</label>
      <input type="time" id="fastEnd">
    </div>
  </div>

  <!-- Display Mode -->
  <h3 data-i18n="displayMode">Display Mode</h3>
  <div class="mode-selector" id="modeSelector">
    <button data-mode="text">
      <span class="icon">⊞</span>
      <span data-i18n="textMode">Text (corners)</span>
      <small data-i18n="textModeDesc">Discreet, upper corners</small>
    </button>
    <button data-mode="timeline">
      <span class="icon">▬</span>
      <span data-i18n="timelineMode">Timeline (bar)</span>
      <small data-i18n="timelineModeDesc">Day progress bar</small>
    </button>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-cancel" id="btnCancel" data-i18n="cancel">Cancel</button>
    <button class="btn-save" id="btnSave" data-i18n="save">Save</button>
  </div>
