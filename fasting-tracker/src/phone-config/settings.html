<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Fasting Tracker</title>
<style>
/* ── Even Realities Design System (Figma 2025) ──────────
   Colors:      TC/BC/SC palette with green accent
   Typography:   FK Display — negative tracking, light/regular weights
   Layout:       12px margin, 16px card padding, 6px radius
   Spacing:      0/6px same-element, 12px same-subject, 24px sections
   Icons:        32×32 grid, 2px padding, 2×2 unit, pixelated corners
   ─────────────────────────────────────────────────────── */
:root {
  /* ── Background Colors (BC) ── */
  --bc-3rd: #0a0a0a;     /* main background */
  --bc-2nd: #141414;     /* card background */
  --bc-4th: #1a1a1a;    /* elevated surface */
  --bc-accent: #002010;  /* accent background */

  /* ── Text Colors (TC) ── */
  --tc-1st: #f0f0f0;     /* primary text */
  --tc-2nd: #a0a0a0;     /* secondary text */
  --tc-green: #4ADE80;   /* accent green */

  /* ── Borders & UI ── */
  --border: #2a2a2a;
  --radius: 6px;
  --radius-offset: 4px;
}
* { box-sizing:border-box; margin:0 }

body {
  padding: 0 12px;       /* ER default margin: 12px */
  background: var(--bc-3rd);
  color: var(--tc-1st);
  font-family: 'FK Display', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  font-size: 15px; font-weight: 300;   /* Normal Body: 15px Light */
  letter-spacing: -0.15px;
  line-height: 1.35;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* ── Typography hierarchy (ER Figma 2025) ───────────── */
h2 {
  font-size: 20px; font-weight: 400;    /* Large Title: 20px Regular */
  letter-spacing: -0.6px;
  padding: 20px 0 16px;
  color: var(--tc-1st);
}
h3 {
  font-size: 11px; font-weight: 400;    /* Normal Detail: 11px Regular */
  letter-spacing: -0.11px;
  color: var(--tc-2nd);
  text-transform: uppercase;
  margin: 24px 0 8px;   /* 24px between different sections */
}

/* ── Language toggle (segmented control) ──────────────── */
.lang-row {
  display:flex; gap:0;
  border-radius: var(--radius);
  overflow:hidden;
}
.lang-row button {
  flex:1; padding:8px 0;
  font-size:13px; font-weight:400; letter-spacing:-0.13px;
  border:1px solid var(--border);
  background: var(--bc-2nd); color: var(--tc-2nd);
  cursor:pointer; transition:all .15s;
}
.lang-row button.active {
  background: var(--bc-4th); color: var(--tc-1st);
  border-color: var(--border);
}

/* ── Preset grid ──────────────────────────────────────── */
.preset-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:6px;  /* 6px same-element spacing */
}
.preset-card {
  padding: 16px 12px;    /* 16px card padding */
  border: 1px solid var(--border);
  border-radius: var(--radius);  /* 6px default radius, 60% corner smoothing */
  background: var(--bc-2nd);
  cursor: pointer;
  transition: border-color .15s, background .15s;
  display: flex; align-items: flex-start; gap: 10px;
}
.preset-card:active { background: var(--bc-4th) }
.preset-card.active {
  border-color: var(--tc-green);
  background: var(--bc-accent);
}
.dot {
  width: 12px; height: 12px; border-radius: 2px;  /* pixelated corner */
  flex-shrink: 0; margin-top: 1px;
}
.dot.custom {
  border: 1.5px dashed var(--tc-2nd);
  background: transparent;
}
.card-name {
  font-size: 15px; font-weight: 400; letter-spacing: -0.15px;  /* Normal Title */
  color: var(--tc-1st); display: block; margin-bottom: 2px;
}
.card-desc {
  font-size: 11px; font-weight: 400; letter-spacing: -0.11px;  /* Normal Detail */
  color: var(--tc-2nd); line-height: 1.3;
}

/* ── Time inputs ──────────────────────────────────────── */
.time-row {
  display: grid; grid-template-columns: auto 1fr auto 1fr;
  align-items: center; gap: 8px;
}
.time-label {
  font-size: 13px; font-weight: 400; letter-spacing: -0.13px;  /* Normal Subtitle */
  color: var(--tc-2nd);
}
.time-input {
  width: 100%; padding: 10px 12px;
  font-size: 15px; font-weight: 300; letter-spacing: -0.15px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bc-2nd); color: var(--tc-1st);
}
.time-sep {
  font-size: 15px; color: var(--tc-2nd);
}

/* ── Display mode ─────────────────────────────────────── */
.mode-row {
  display:grid; grid-template-columns:1fr 1fr;
  gap:6px;  /* 6px same-element */
}
.mode-btn {
  padding: 16px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bc-2nd);
  color: var(--tc-2nd);
  cursor: pointer; text-align: center;
  transition: border-color .15s, background .15s;
}
.mode-btn:active { background: var(--bc-4th) }
.mode-btn.active {
  border-color: var(--tc-green);
  background: var(--bc-accent);
}
.mode-icon { font-size:28px; display:block; margin-bottom:6px }
.mode-label {
  font-size: 15px; font-weight: 400; letter-spacing: -0.15px;
  color: var(--tc-1st);
}
.mode-sub {
  font-size: 11px; font-weight: 400; letter-spacing: -0.11px;
  color: var(--tc-2nd); margin-top:2px; display:block;
}

/* ── Actions ──────────────────────────────────────────── */
.actions {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;   /* 12px same-subject */
  margin-top: 32px; padding-bottom: 24px;
}
.btn {
  padding: 12px; border: none;
  border-radius: var(--radius);
  font-size: 15px; font-weight: 400; letter-spacing: -0.15px;
  cursor: pointer;
  transition: opacity .15s;
}
.btn:active { opacity: 0.8 }
.btn-primary { background: var(--tc-green); color: #000 }
.btn-secondary {
  background: var(--bc-2nd); color: var(--tc-2nd);
  border: 1px solid var(--border);
}

/* ── Toast ────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--tc-green); color: #000;
  padding: 8px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 400; letter-spacing: -0.13px;
  opacity: 0; transition: opacity .3s;
  pointer-events: none; z-index: 10;
}
.toast.show { opacity: 1 }
</style>
</head>
<body>

<h2 id="pageTitle">Fasting Tracker</h2>

<h3 id="langLabel">Language</h3>
<div class="lang-row" id="langToggle">
  <button data-lang="en" class="active">English</button>
  <button data-lang="fr">Français</button>
</div>

<h3 id="typeLabel">Fasting Type</h3>
<div class="preset-grid" id="presetGrid"></div>

<h3 id="schedLabel">Schedule</h3>
<div class="time-row">
  <span class="time-label" id="startLabel">Start</span>
  <input type="time" class="time-input" id="fastStart">
  <span class="time-sep">→</span>
  <span class="time-label" id="endLabel">End</span>
  <input type="time" class="time-input" id="fastEnd">
</div>

<h3 id="displayLabel">Display Mode</h3>
<div class="mode-row" id="modeSelector">
  <button class="mode-btn active" data-mode="text">
    <span class="mode-icon">⊞</span>
    <span class="mode-label" id="textLabel">Text</span>
    <span class="mode-sub" id="textSub">Corner display</span>
  </button>
  <button class="mode-btn" data-mode="timeline">
    <span class="mode-icon">▬</span>
    <span class="mode-label" id="tlLabel">Timeline</span>
    <span class="mode-sub" id="tlSub">Progress bar</span>
  </button>
</div>

<div class="actions">
  <button class="btn btn-secondary" id="btnCancel">Cancel</button>
  <button class="btn btn-primary" id="btnSave">Save</button>
</div>

<div class="toast" id="toast">Saved</div>

<script>
(function(){
'use strict';

var T={en:{
  title:'Fasting Tracker',lang:'Language',type:'Fasting Type',
  schedule:'Schedule',start:'Start',end:'End',
  display:'Display Mode',text:'Text',textDesc:'Corner display',
  timeline:'Timeline',timelineDesc:'Progress bar',
  custom:'Custom',customDesc:'Your own hours',
  cancel:'Cancel',save:'Save',saved:'Saved',
  fasting:'FASTING',eating:'EATING',restDay:'REST DAY',
  p14n:'14:10 — Beginner',p14d:'14h fast · 10h eating',
  p16n:'16:8 — Leangains',p16d:'16h fast · 8h eating',
  p18n:'18:6 — Extended',p18d:'18h fast · 6h eating',
  p20n:'20:4 — Warrior',p20d:'20h fast · 4h eating',
  p23n:'OMAD — One Meal',p23d:'23h fast · 1 meal',
  p52n:'5:2 — Weekday',p52d:'5d eat · 2d fast (Tue/Thu)',
  padfn:'ADF — Alt. Day',padfd:'Fast every other day'},
fr:{
  title:'Tracker Jeûne',lang:'Langue',type:'Protocole',
  schedule:'Horaires',start:'Début',end:'Fin',
  display:'Affichage',text:'Texte',textDesc:'Coins discrets',
  timeline:'Barre',timelineDesc:'Ligne progression',
  custom:'Perso',customDesc:'Vos horaires',
  cancel:'Annuler',save:'Enregistrer',saved:'Sauvegardé',
  fasting:'À JEUN',eating:'REPAS',restDay:'JOUR OFF',
  p14n:'14:10 — Doux',p14d:'14h à jeun · 10h repas',
  p16n:'16:8 — Leangains',p16d:'16h à jeun · 8h repas',
  p18n:'18:6 — Confirmé',p18d:'18h à jeun · 6h repas',
  p20n:'20:4 — Warrior',p20d:'20h à jeun · 4h repas',
  p23n:'OMAD — Repas unique',p23d:'23h à jeun · 1 repas',
  p52n:'5:2 — Hebdo',p52d:'5j normal · 2j à jeun (Mar/Jeu)',
  padfn:'ADF — Alterné',padfd:'À jeun un jour sur deux'}};

var PRESETS=[
  {id:'14:10',start:'20:00',end:'10:00',color:'#4CAF50'},
  {id:'16:8',start:'20:00',end:'12:00',color:'#2196F3'},
  {id:'18:6',start:'20:00',end:'14:00',color:'#9C27B0'},
  {id:'20:4',start:'20:00',end:'16:00',color:'#FF9800'},
  {id:'23:1',start:'19:00',end:'18:00',color:'#F44336'},
  {id:'5:2-week',start:'00:00',end:'00:00',color:'#607D8B'},
  {id:'adf',start:'00:00',end:'00:00',color:'#795548'}];

var cfg={presetId:'16:8',schedule:{fastStart:'20:00',fastEnd:'12:00'},displayMode:'text',lang:'en'};
try{var r=localStorage.getItem('even-fasting-config');if(r){var p=JSON.parse(r);Object.assign(cfg,p)}}catch(e){}

function t(k){var d=T[cfg.lang]||T.en;return d[k]||T.en[k]||k}
function pn(id){var m={'14:10':'p14n','16:8':'p16n','18:6':'p18n','20:4':'p20n','23:1':'p23n','5:2-week':'p52n','adf':'padfn'};return t(m[id]||'custom')}
function pd(id){var m={'14:10':'p14d','16:8':'p16d','18:6':'p18d','20:4':'p20d','23:1':'p23d','5:2-week':'p52d','adf':'padfd'};return t(m[id]||'customDesc')}

function save(){localStorage.setItem('even-fasting-config',JSON.stringify(cfg))}

function render(){
  document.title=t('title');
  var ids={'pageTitle':'title','langLabel':'lang','typeLabel':'type','schedLabel':'schedule',
    'startLabel':'start','endLabel':'end','displayLabel':'display',
    'textLabel':'text','textSub':'textDesc','tlLabel':'timeline','tlSub':'timelineDesc',
    'btnCancel':'cancel','btnSave':'save'};
  for(var k in ids) document.getElementById(k).textContent=t(ids[k]);

  var lbs=document.querySelectorAll('#langToggle button');
  lbs.forEach(function(b){b.classList.toggle('active',b.dataset.lang===cfg.lang)});

  var g=document.getElementById('presetGrid');g.innerHTML='';
  PRESETS.forEach(function(p){
    var c=document.createElement('div');c.className='preset-card';
    if(cfg.presetId===p.id){c.classList.add('active');c.style.borderColor=p.color}
    var d=document.createElement('div');d.className='dot';d.style.background=p.color;
    var i=document.createElement('div');i.className='card-info';
    i.innerHTML='<span class="card-name">'+pn(p.id)+'</span><span class="card-desc">'+pd(p.id)+'</span>';
    c.appendChild(d);c.appendChild(i);
    c.onclick=function(){sel(p.id)};g.appendChild(c);
  });
  var cc=document.createElement('div');cc.className='preset-card';
  if(cfg.presetId==='custom')cc.classList.add('active');
  var cd=document.createElement('div');cd.className='dot custom';
  var ci=document.createElement('div');ci.className='card-info';
  ci.innerHTML='<span class="card-name">'+t('custom')+'</span><span class="card-desc">'+t('customDesc')+'</span>';
  cc.appendChild(cd);cc.appendChild(ci);cc.onclick=function(){sel('custom')};g.appendChild(cc);

  document.getElementById('fastStart').value=cfg.schedule.fastStart;
  document.getElementById('fastEnd').value=cfg.schedule.fastEnd;

  var mbs=document.querySelectorAll('#modeSelector button');
  mbs.forEach(function(b){b.classList.toggle('active',b.dataset.mode===cfg.displayMode)});
}

function sel(id){
  cfg.presetId=id;
  if(id!=='custom'){var p=PRESETS.find(function(x){return x.id===id});if(p){cfg.schedule.fastStart=p.start;cfg.schedule.fastEnd=p.end}}
  render()
}

document.getElementById('langToggle').addEventListener('click',function(e){
  var b=e.target.closest('button');if(!b)return;
  cfg.lang=b.dataset.lang;document.documentElement.lang=cfg.lang;render()
});
document.getElementById('fastStart').addEventListener('input',function(){cfg.schedule.fastStart=this.value;cfg.presetId='custom';render()});
document.getElementById('fastEnd').addEventListener('input',function(){cfg.schedule.fastEnd=this.value;cfg.presetId='custom';render()});
document.getElementById('modeSelector').addEventListener('click',function(e){
  var b=e.target.closest('button');if(!b)return;
  cfg.displayMode=b.dataset.mode;render()
});
document.getElementById('btnSave').addEventListener('click',function(){
  cfg.schedule.fastStart=document.getElementById('fastStart').value;
  cfg.schedule.fastEnd=document.getElementById('fastEnd').value;save();
  var toast=document.getElementById('toast');toast.textContent=t('saved');toast.classList.add('show');
  setTimeout(function(){toast.classList.remove('show')},1500)
});
document.getElementById('btnCancel').addEventListener('click',function(){
  try{var r=localStorage.getItem('even-fasting-config');if(r){var p=JSON.parse(r);Object.assign(cfg,p)}}catch(e){}render()
});

render()
})();
</script>
</body>
</html>
