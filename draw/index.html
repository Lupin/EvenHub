<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>G2 Block Draw</title>
  <style>
    :root { --bg:#0c0a07; --surface:#161310; --text:#f0ebe3; --text-dim:#8a7f72; --accent:#4ade80; --border:#2a2520; --radius:6px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,sans-serif; font-size:15px; padding:16px; min-height:100vh; user-select:none; -webkit-user-select:none; touch-action:none; }
    #phone-ui { display:none; } #phone-ui.on { display:block; }
    .header { margin-bottom:20px; } .header h1 { font-size:20px; font-weight:600; }
    .group { background:var(--surface); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; }
    .row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; }
    .row label { flex:1; }
    .row select { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; font-size:14px; font-family:inherit; }
    .row input { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:var(--radius); padding:8px 12px; font-size:14px; font-family:inherit; width:80px; text-align:center; }
    .btn { display:block; margin:0 6px 16px 34px; padding:12px 0; text-align:center; background:var(--accent); color:var(--bg); border:none; border-radius:var(--radius); font-size:15px; font-weight:600; cursor:pointer; width:calc(100% - 60px); }
    .section-title { padding:12px 16px 4px; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }
    .toggle-row { display:flex; align-items:center; padding:10px 16px; gap:8px; }
    .toggle-row span { font-size:13px; color:var(--text-dim); }
    .toggle { width:44px; height:24px; background:var(--border); border-radius:12px; cursor:pointer; position:relative; flex-shrink:0; }
    .toggle.on { background:var(--accent); }
    .toggle::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:white; border-radius:50%; transition:left .15s; }
    .toggle.on::after { left:22px; }
    .brush-grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:4px; padding:8px 16px 12px; }
    .brush-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; background:var(--bg); border-radius:4px; font-size:22px; cursor:pointer; color:var(--text-dim); border:2px solid transparent; }
    .brush-cell.on { border-color:var(--accent); color:var(--text); }
    .size-row { display:flex; align-items:center; gap:8px; padding:8px 16px; }
    .size-row .lbl { font-size:13px; color:var(--text-dim); width:30px; }
    .size-row .val { font-size:14px; color:var(--text); width:24px; text-align:center; }
    .size-btn { width:36px; height:36px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .canvas-grid { display:grid; gap:1px; padding:8px 16px 12px; width:fit-content; margin:0 auto; }
    .canvas-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; background:var(--bg); border-radius:2px; font-size:8px; cursor:pointer; color:var(--text-dim); width:16px; height:16px; }
    .canvas-cell.filled { background:var(--border); }
    .btn-row { display:flex; gap:8px; padding:8px 16px 12px; }
    .btn-row .btn { flex:1; }
  </style>
</head>
<body>
  <div id="phone-ui">
    <div class="header"><h1>Block Draw</h1></div>
    <div class="group">
      <div class="row">
        <label>Mode</label>
        <select id="mode">
          <option value="draw" selected>Dessin</option>
          <option value="text">Texte</option>
        </select>
      </div>
    </div>

    <!-- Text mode -->
    <div class="group" id="textGroup" style="display:none">
      <div class="row"><label>Texte (4 max)</label><input id="text" type="text" maxlength="4" value="8"></div>
      <div class="section-title">Mode</div>
      <div class="toggle-row"><div class="toggle" id="randomToggle"></div><span id="randomLabel">Random: off</span></div>
      <div class="section-title">Glyphes</div>
      <div class="brush-grid" id="textGlyphs"></div>
      <button class="btn" id="textPush">Push to G2</button>
    </div>

    <!-- Draw mode -->
    <div class="group" id="drawGroup">
      <div class="row"><label>Set pinceaux</label><select id="brushSet"></select></div>
      <div class="brush-grid" id="drawGlyphs"></div>
      <div class="section-title">Taille grille</div>
      <div class="size-row">
        <span class="lbl">C</span><button class="size-btn" id="colMinus">−</button><span class="val" id="colVal">25</span><button class="size-btn" id="colPlus">+</button>
        <span style="flex:1"></span>
        <span class="lbl">R</span><button class="size-btn" id="rowMinus">−</button><span class="val" id="rowVal">7</span><button class="size-btn" id="rowPlus">+</button>
      </div>
      <div class="btn-row"><button class="btn" id="eraser">⌫ Gomme</button><button class="btn" id="clear">Clear</button></div>
      <div class="canvas-grid" id="canvas"></div>
      <button class="btn" id="drawPush">Push to G2</button>
    </div>
  </div>

  <script>
    if (!navigator.userAgent.includes('Even') && !location.search.includes('g2=1'))
      document.getElementById('phone-ui').classList.add('on');

    var FW = '\u3000';
    var BRUSH_SETS = [
      { name: 'Blocs', glyphs: '■□▣▤▥▦▧▨▩▰▱◧◨◩◪◫' },
      { name: 'Triangles', glyphs: '▲△▶▷▼▽◀◁◢◣◤◥◭◮◬◿' },
      { name: 'Formes', glyphs: '◆◇◈◊○◌◎●◐◑◯⬡⬢⬣⬤⬥' },
      { name: 'Box 1', glyphs: '─━│┃┌┍┎┏┐┑┒┓└┕┖┗' },
      { name: 'Box 2', glyphs: '┘┙┚┛├┝┞┟┠┡┢┣┤┥┦┧' },
      { name: 'Box 3', glyphs: '┨┩┪┫┬┭┮┯┰┱┲┳┴┵┶┷' },
      { name: 'Box 4', glyphs: '┸┹┺┻┼┽┾┿╀╁╂╃╄╅╆╇' },
      { name: 'Box 5', glyphs: '╈╉╊╋═╞╡╪╭╮╯╰╱╲╳▧' },
      { name: 'Blocks', glyphs: '▁▂▃▄▅▆▇█▉▊▋▌▍▎▏▒' },
      { name: 'Blocks 2', glyphs: '▔▕■□▣▤▥▦▧▨▩▰▱◧◨◩' },
      { name: 'Mix 1', glyphs: '■▲◆●◈▣▶▼◀▤▥◐◑◧◨◩' },
    ];

    var modeSel = document.getElementById('mode');
    var textGroup = document.getElementById('textGroup');
    var drawGroup = document.getElementById('drawGroup');
    modeSel.addEventListener('change', function(){
      var v = modeSel.value;
      textGroup.style.display = v === 'text' ? 'block' : 'none';
      drawGroup.style.display = v === 'draw' ? 'block' : 'none';
    });

    // ==================== TEXT MODE ====================
    (function(){
      var input = document.getElementById('text');
      var toggle = document.getElementById('randomToggle');
      var label = document.getElementById('randomLabel');
      var randomOn = false, activeGlyphs = new Set(['■']), cells = [];
      function updateUI() {
        toggle.classList.toggle('on', randomOn);
        label.textContent = randomOn ? 'Random: on' : 'Random: off';
        cells.forEach(function(c){ c.classList.toggle('on', activeGlyphs.has(c.textContent)); });
      }
      toggle.addEventListener('click', function(){
        randomOn = !randomOn;
        if (!randomOn) { var f = activeGlyphs.values().next().value || '■'; activeGlyphs.clear(); activeGlyphs.add(f); }
        updateUI();
      });
      var grid = document.getElementById('textGlyphs');
      var all = ['■','□','▣','▤','▥','▦','▧','▨','▩','▲','△','▶','▷','◆','◇','◈'];
      all.forEach(function(g){
        var c = document.createElement('div'); c.className = 'brush-cell'; c.textContent = g;
        c.addEventListener('click', function(){
          if (!randomOn) { activeGlyphs.clear(); activeGlyphs.add(g); }
          else { if (activeGlyphs.has(g)) { activeGlyphs.delete(g); if (activeGlyphs.size===0) activeGlyphs.add(g); } else activeGlyphs.add(g); }
          updateUI();
        });
        cells.push(c); grid.appendChild(c);
      });
      updateUI();
      document.getElementById('textPush').addEventListener('click', function(){
        localStorage.setItem('g2-push', JSON.stringify({ mode:'text', text:input.value||'8', random:randomOn, glyphs:Array.from(activeGlyphs) }));
      });
    })();

    // ==================== DRAW MODE ====================
    (function(){
      var brush = '■', canvasData = {}, cols = 25, rows = 7, cellEls = [];
      var setSel = document.getElementById('brushSet'), brushGrid = document.getElementById('drawGlyphs');
      BRUSH_SETS.forEach(function(s,i){ var o = document.createElement('option'); o.value=i; o.textContent=s.name; setSel.appendChild(o); });
      function renderSet(idx) {
        brushGrid.innerHTML = '';
        BRUSH_SETS[idx].glyphs.split('').forEach(function(g){
          var c = document.createElement('div'); c.className = 'brush-cell';
          if (g===brush) c.classList.add('on'); c.textContent = g;
          c.addEventListener('click', function(){ brush=g; document.querySelectorAll('#drawGlyphs .brush-cell').forEach(function(x){ x.classList.toggle('on', x.textContent===g); }); });
          brushGrid.appendChild(c);
        });
      }
      setSel.addEventListener('change', function(){ renderSet(parseInt(this.value)); });
      renderSet(0);

      var eraserOn = false;
      document.getElementById('eraser').addEventListener('click', function(){
        eraserOn = !eraserOn;
        this.textContent = eraserOn ? '✏ Crayon' : '⌫ Gomme';
        if (eraserOn) { brush = FW; document.querySelectorAll('#drawGlyphs .brush-cell').forEach(function(c){ c.classList.remove('on'); }); }
        else { brush = '■'; document.querySelectorAll('#drawGlyphs .brush-cell').forEach(function(c){ c.classList.toggle('on', c.textContent==='■'); }); }
      });

      var colVal = document.getElementById('colVal'), rowVal = document.getElementById('rowVal');
      function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }
      document.getElementById('colMinus').addEventListener('click', function(){ cols=clamp(cols-1,6,28); colVal.textContent=cols; rebuild(); });
      document.getElementById('colPlus').addEventListener('click', function(){ cols=clamp(cols+1,6,28); colVal.textContent=cols; rebuild(); });
      document.getElementById('rowMinus').addEventListener('click', function(){ rows=clamp(rows-1,6,7); rowVal.textContent=rows; rebuild(); });
      document.getElementById('rowPlus').addEventListener('click', function(){ rows=clamp(rows+1,6,7); rowVal.textContent=rows; rebuild(); });

      var canvasEl = document.getElementById('canvas');
      function rebuild() {
        canvasEl.innerHTML = '';
        var availW = Math.min(document.documentElement.clientWidth - 32, 576);
        var margin = cols <= 12 ? 32 : cols <= 18 ? 24 : cols <= 24 ? 20 : 16;
        availW -= margin * 2;
        var cellSize = Math.floor((availW - (cols - 1)) / cols);
        var maxSize = cols <= 10 ? 36 : cols <= 14 ? 30 : cols <= 18 ? 24 : 20;
        cellSize = Math.max(10, Math.min(maxSize, cellSize));
        canvasEl.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
        cellEls = [];
        for (var y = 0; y < rows; y++) {
          for (var x = 0; x < cols; x++) {
            var cell = document.createElement('div'); cell.className = 'canvas-cell';
            cell.style.width = cellSize+'px'; cell.style.height = cellSize+'px';
            cell.dataset.x = x; cell.dataset.y = y;
            var k = x+','+y;
            if (canvasData[k]) { cell.textContent = canvasData[k]; cell.classList.add('filled'); }
            cellEls.push(cell); canvasEl.appendChild(cell);
          }
        }
      }
      rebuild();

      function paint(el, g) {
        var k = el.dataset.x+','+el.dataset.y;
        if (g === FW) { delete canvasData[k]; el.textContent = ''; el.classList.remove('filled'); }
        else { canvasData[k] = g; el.textContent = g; el.classList.add('filled'); }
      }
      function cellFromTouch(t) { var e = document.elementFromPoint(t.clientX, t.clientY); return e && e.classList.contains('canvas-cell') ? e : null; }
      canvasEl.addEventListener('touchstart', function(e){ e.preventDefault(); var c = cellFromTouch(e.touches[0]); if (c) paint(c, brush); });
      canvasEl.addEventListener('touchmove', function(e){ e.preventDefault(); var c = cellFromTouch(e.touches[0]); if (c) paint(c, brush); });
      var md = false;
      canvasEl.addEventListener('mousedown', function(e){ md=true; if (e.target.classList.contains('canvas-cell')) paint(e.target, brush); });
      canvasEl.addEventListener('mousemove', function(e){ if (md && e.target.classList.contains('canvas-cell')) paint(e.target, brush); });
      canvasEl.addEventListener('mouseup', function(){ md=false; });
      canvasEl.addEventListener('mouseleave', function(){ md=false; });

      document.getElementById('clear').addEventListener('click', function(){ canvasData={}; cellEls.forEach(function(c){ c.textContent=''; c.classList.remove('filled'); }); });
      document.getElementById('drawPush').addEventListener('click', function(){
        var lines = [], y, x;
        for (y = 0; y < rows; y++) { var line=''; for (x=0;x<cols;x++) line += canvasData[x+','+y]||FW; lines.push(line); }
        localStorage.setItem('g2-push', JSON.stringify({ mode:'draw', lines:lines }));
      });
    })();
  </script>

  <script src="/node_modules/@evenrealities/even_hub_sdk/dist/even_hub_sdk.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
