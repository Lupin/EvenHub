var systemQuery = window.matchMedia('(prefers-color-scheme: dark)');

function resolveTheme(theme) {
  if (theme === 'system') return systemQuery.matches ? 'dark' : 'light';
  return theme;
}

function applyTheme(theme) {
  var resolved = resolveTheme(theme);
  document.documentElement.setAttribute('data-theme', theme);
  if (resolved === 'light') {
    darkLink.disabled = true;
    lightLink.disabled = false;
  } else {
    lightLink.disabled = true;

  }
}

// ── Storage bridge ─────────────────────────────────────
var storeReady = false;
var storeBridge = null;

// Wait for bridge exposed by main.ts (module script, runs after inline)
// Falls back to localStorage if bridge never appears (dev mode / navigateur)
function initStore() {
  // Check immediately — main.ts may have already set __bridge
  if (window.__bridge) {
    storeBridge = window.__bridge;
    storeReady = true;
    return;
  }
  // Poll for up to 2 seconds — main.ts is a module script so it runs async
  var attempts = 0;
  return new Promise(function(resolve) {
    var check = setInterval(function() {
      attempts++;
      if (window.__bridge) {
        storeBridge = window.__bridge;
        storeReady = true;
        clearInterval(check);
        resolve();
      } else if (attempts > 20) {
        clearInterval(check);
        console.log('[FastingTracker] Bridge not found, using localStorage fallback');
        resolve();
      }
    }, 100);
  });
}

async function loadStore() {
  if (storeBridge && storeReady) {
    try {
      var raw = await storeBridge.getLocalStorage('even-fasting-config');
      if (raw) return JSON.parse(raw);
    } catch(e) {}
  }
  // Fallback: localStorage
  try {
    var raw = localStorage.getItem('even-fasting-config');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

async function saveStore(data) {
  var json = JSON.stringify(data);
  if (storeBridge && storeReady) {
    try { await storeBridge.setLocalStorage('even-fasting-config', json); } catch(e) {}
  }
  try { localStorage.setItem('even-fasting-config', json); } catch(e) {}
}

      if (saved.schedule) {
        if (saved.schedule.fastStart) cfg.schedule.fastStart = saved.schedule.fastStart;
        if (saved.schedule.fastEnd) cfg.schedule.fastEnd = saved.schedule.fastEnd;
      }
      if (saved.presetId) cfg.presetId = saved.presetId;
      if (saved.displayMode) cfg.displayMode = saved.displayMode;
      if (saved.lang) cfg.lang = saved.lang;
      if (saved.timeFormat) cfg.timeFormat = saved.timeFormat;
      if (saved.theme) cfg.theme = saved.theme;
    }
  } catch(e) {}

  // Apply saved theme on load
  applyTheme(cfg.theme);
  // Show UI
  document.getElementById('phone-ui').style.display = 'block';
  render();
});

async function saveCfg(){ await saveStore(cfg); }

// ── i18n ────────────────────────────────────────────
window.getFastingConfig = function(){ return cfg; };

// ── Helpers ───────────────────────────────────────────
function t(k){ var d = T[cfg.lang] || T.en; return d[k] || T.en[k] || k; }
function pn(id){
  var m = {'14:10':'p14n','16:8':'p16n','18:6':'p18n','20:4':'p20n','23:1':'p23n','5:2-week':'p52n','adf':'padfn'};
  return t(m[id] || id);
}
function pd(id){
  var m = {'14:10':'p14d','16:8':'p16d','18:6':'p18d','20:4':'p20d','23:1':'p23d','5:2-week':'p52d','adf':'padfd'};
  return t(m[id] || '');
}

// ── Render ────────────────────────────────────────────
function render(){
  // Section headings
  var ids = {
    typeLabel:'type', schedLabel:'sched', settingsLabel:'settings',
    startLabel:'start', langTitle:'lang', timeFmtTitle:'timeFmt', themeTitle:'theme',
    segText:'text', segTimeline:'timeline',
    btnCancel:'cancel', btnSave:'save'
  };
  for (var k in ids) {
    var el = document.getElementById(k);
    if (el) el.textContent = t(ids[k]);
  }

  // Segmented control
  var segBtns = document.querySelectorAll('.segmented button');
  segBtns.forEach(function(b){ b.classList.toggle('active', b.dataset.mode === cfg.displayMode); });

  // Presets
  var grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach(function(p){
    var el = document.createElement('button');
    el.className = 'preset-item';
    if (cfg.presetId === p.id) el.classList.add('active');
    el.innerHTML =
      '<span class="preset-dot"></span>' +
      '<span>' +
        '<span class="preset-name">' + pn(p.id) + '</span>' +
        '<br><span class="preset-desc">' + pd(p.id) + '</span>' +
      '</span>';
    el.onclick = function(){ selectPreset(p.id); };
    grid.appendChild(el);
  });

  // Time input (start only)
  document.getElementById('fastStart').value = cfg.schedule.fastStart;

  // Settings values
  var ls = document.getElementById('langSelect');
  ls.innerHTML =
    '<option value=\"en\">' + t('en') + '</option>' +
    '<option value=\"fr\">' + t('fr') + '</option>' +
    '<option value=\"es\">' + t('es') + '</option>' +
    '<option value=\"zh\">' + t('zh') + '</option>' +
    '<option value=\"ja\">' + t('ja') + '</option>' +
    '<option value=\"ko\">' + t('ko') + '</option>';
  ls.value = cfg.lang;
  document.getElementById('timeFmtValue').textContent = cfg.timeFormat === '24h' ? '24h' : 'AM/PM';
  var ts = document.getElementById('themeSelect');
  ts.innerHTML =
    '<option value=\"dark\">' + t('dark') + '</option>' +
    '<option value=\"light\">' + t('light') + '</option>' +
    '<option value=\"system\">' + t('system') + '</option>';
  ts.value = cfg.theme;

  // Version footer
  document.getElementById('appVersion').textContent = APP_VERSION;
}

// ── Actions ───────────────────────────────────────────
function selectPreset(id){
  cfg.presetId = id;
  var p = PRESETS.find(function(x){ return x.id === id; });
  if (p) {
    cfg.schedule.fastStart = p.start;
    cfg.schedule.fastEnd = p.end;
  }
  render();
}

// Shift start time → auto-adjust end to keep same duration
document.getElementById('fastStart').addEventListener('input', function(){
  var newStart = this.value;
  var oldStart = cfg.schedule.fastStart;

  var oh = parseInt(oldStart.split(':')[0]), om = parseInt(oldStart.split(':')[1]);
  var oldStartMin = oh * 60 + om;
  var eh = parseInt(cfg.schedule.fastEnd.split(':')[0]), em = parseInt(cfg.schedule.fastEnd.split(':')[1]);
  var oldEndMin = eh * 60 + em;
  var duration = oldEndMin <= oldStartMin ? oldEndMin + 1440 - oldStartMin : oldEndMin - oldStartMin;

  var nh = parseInt(newStart.split(':')[0]), nm = parseInt(newStart.split(':')[1]);
  var newStartMin = nh * 60 + nm;
  var newEndMin = (newStartMin + duration) % 1440;
  var neh = Math.floor(newEndMin / 60), nem = newEndMin % 60;

  cfg.schedule.fastStart = newStart;
  cfg.schedule.fastEnd = String(neh).padStart(2,'0') + ':' + String(nem).padStart(2,'0');
});

// SegmentedControl tap — force push to glasses immediately
document.getElementById('modeSelector').addEventListener('click', async function(e){
  var b = e.target.closest('button');
  if (!b) return;
  cfg.displayMode = b.dataset.mode;
  render();
  // Save config and force immediate refresh on glasses
  await saveCfg();
  if (window.__forceRefresh) {
    try { await window.__forceRefresh(); } catch(e) {}
  }
});

// Language select
document.getElementById('langSelect').addEventListener('change', function(){
  cfg.lang = this.value;
  document.documentElement.lang = cfg.lang;
  render();
});

// Time format toggle
document.getElementById('timeFmtRow').addEventListener('click', function(){
  cfg.timeFormat = cfg.timeFormat === '24h' ? '12h' : '24h';
  render();
});

// Theme select
var themeSelect = document.getElementById('themeSelect');
themeSelect.value = cfg.theme;
themeSelect.addEventListener('change', function(){
  cfg.theme = this.value;
  applyTheme(cfg.theme);
  saveStore(cfg);
});

// Save
document.getElementById('btnSave').addEventListener('click', function(){
  cfg.schedule.fastStart = document.getElementById('fastStart').value;
  saveCfg();
  var status = document.getElementById('saveStatus');
  status.classList.add('show');
  setTimeout(function(){ status.classList.remove('show'); }, 1500);
});

// Cancel (revert from storage)
document.getElementById('btnCancel').addEventListener('click', async function(){
  try{
    var saved = await loadStore();
    if (saved) {
      if (saved.schedule) {
        if (saved.schedule.fastStart) cfg.schedule.fastStart = saved.schedule.fastStart;
        if (saved.schedule.fastEnd) cfg.schedule.fastEnd = saved.schedule.fastEnd;
      }
      if (saved.presetId) cfg.presetId = saved.presetId;
      if (saved.displayMode) cfg.displayMode = saved.displayMode;
      if (saved.lang) cfg.lang = saved.lang;
      if (saved.timeFormat) cfg.timeFormat = saved.timeFormat;
      if (saved.theme) cfg.theme = saved.theme;
    }
  }catch(e){}
  applyTheme(cfg.theme);
  render();
});

})();
</script>
